[profile]
name = "gbmicrotest"
description = "Full dump for gbmicrotest cycle-accuracy tests (missingno-side; adds internal-state extensions)."
trigger = "tcycle"

[fields]
cpu = "registers"
ppu = "all"
timer = true
interrupt = true
serial = true

[fields.memory]
test_result = "FF80"
test_expect = "FF81"
test_pass   = "FF82"

[fields.extensions]
missingno = [
  "ppu_half_mcycle", "ppu_mcycle", "ppu_scan_clock", "ppu_lx",
  "ppu_mode2_active", "ppu_end_of_visible_line", "ppu_stat_line",
]
