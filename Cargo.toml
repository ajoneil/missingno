[package]
name = "missingno"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Game Boy emulator and debugger"
repository = "https://github.com/ajoneil/missingno"

[build-dependencies]
vergen = { version = "8", features = ["git", "gitcl"] }

[dependencies]
futures-util = "0.3.31"
i18n-embed-fl = "0.9.2"
open = "5.3.0"
rust-embed = "8.5.0"
tokio = { version = "1.41.0", features = ["full"] }

[dependencies.i18n-embed]
version = "0.15"
features = ["fluent-system", "desktop-requester"]

[dependencies.libcosmic]
git = "https://github.com/pop-os/libcosmic.git"
features = [
    "a11y",
    "dbus-config",
    "multi-window",
    "rfd",
    "single-instance",
    "tokio",
    "winit",
    "wayland",
    "wgpu",
]
